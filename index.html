<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <title>Music Visualizer</title>
    <link href="./src/style.css" rel="stylesheet"/>
    <script src="./src/script.js" defer></script>
  </head>
  <body>
    <h1>Music Visualizer</h1>

    <!-- Visualizer -->
    <canvas id="canvas"></canvas>

    <!-- Audio file input and controls -->
    <div id="inputs">
      <label id="label1" for="input1">Sample 1:</label>
      <input
        name="input1"
        id="input1"
        type="file"
        accept="audio/*"
      />
      <br />
      <input min="0" max="100" id="volume1" name="volume1" type="range" value="100" />

      <br />
      
      <label id="label2" for="input2">Sample 2:</label>
      <input
        name="input2"
        id="input2"
        type="file"
        accept="audio/*"
      />
      <br />
      <input min="0" max="100" id="volume2" name="volume2" type="range" value="100" />

      <br />
      <button id="start" onclick="start()">Start</button>
      <button id="stop" onclick="stop()">Stop</button>
    </div>

    <p id="error"></p>

    <footer>
      <p>Aidan Carey 0302409c, April 10th 2026</p>
    </footer>
  </body>
</html>
